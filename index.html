<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>체험 프로그램 신청 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJ-N3AHOzMDSBqKKFtW-kGIGJc6pJJLuw",
            authDomain: "sn2-2-99263.firebaseapp.com",
            projectId: "sn2-2-99263",
            storageBucket: "sn2-2-99263.firebasestorage.app",
            messagingSenderId: "531736022723",
            appId: "1:531736022723:web:90fab577f55a1456635c76"
        };

        const appId = 'program-assign-v2'; 
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADMIN_PW = "2026";

        // 2학년 2반 학생 데이터
        const studentMaster = {
            "강호윤": "1126", "김건우": "0604", "김민수": "1117", "김시훈": "0612", "김어진": "0426",
            "김예은": "0925", "류혜림": "0910", "박윤정": "0522", "서지민": "0703", "신의현": "0516",
            "신효은": "0927", "오준호": "1217", "온나겸": "0121", "이성희": "0302", "임유정": "1012",
            "임지민": "1119", "정윤주": "0715", "조진무": "0407", "조해준": "0515", "한은서": "0426"
        };

        // 2학년 2반 프로그램 인원 데이터
        const programData = {
            am: [
                { id: 1, name: "요리-구름도우피자", limit: 2 },
                { id: 2, name: "목공-창의목공", limit: 3 },
                { id: 3, name: "미디어-디지털캐리커쳐&뱃지만들기", limit: 2 },
                { id: 4, name: "공예-젤리곰키링", limit: 3 },
                { id: 5, name: "예술-와이어드로잉", limit: 2 },
                { id: 6, name: "공예-클레이페인팅숍", limit: 3 },
                { id: 7, name: "원예-테라리움", limit: 2 },
                { id: 8, name: "스포츠-골든에이지", limit: 3 }
            ],
            pm: [
                { id: 1, name: "요리-구름도우피자", limit: 3 },
                { id: 2, name: "목공-창의목공", limit: 2 },
                { id: 3, name: "미디어-디지털캐리커쳐&뱃지만들기", limit: 2 },
                { id: 4, name: "공예-젤리곰키링", limit: 3 },
                { id: 5, name: "예술-와이어드로잉", limit: 2 },
                { id: 6, name: "공예-클레이페인팅숍", limit: 3 },
                { id: 7, name: "원예-테라리움", limit: 3 },
                { id: 8, name: "스포츠-골든에이지", limit: 2 }
            ]
        };

        let assignments = [];
        let authenticatedUser = null; 
        let isAdmin = false;

        onAuthStateChanged(auth, async (user) => {
            if (!user) await signInAnonymously(auth);
            else listenData();
        });

        function listenData() {
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'assignments');
            onSnapshot(q, (snapshot) => {
                assignments = snapshot.docs.map(doc => doc.data());
                updateUI();
            });
        }

        window.handleAuth = () => {
            const name = document.getElementById('studentSelect').value;
            const inputPw = document.getElementById('studentPw').value.trim();
            if (inputPw === ADMIN_PW) { 
                isAdmin = true; authenticatedUser = "관리자"; 
                updateUI(); showMessage("관리자 모드 접속.");
                return; 
            }
            if (!name) return showMessage("이름을 선택하세요.", true);
            if (studentMaster[name] === inputPw) {
                authenticatedUser = name; isAdmin = false;
                updateUI(); 
                const existing = assignments.find(a => a.name === name);
                if (existing) {
                    document.getElementById('amSelect').value = existing.amId;
                    document.getElementById('pmSelect').value = existing.pmId;
                }
                showMessage(`${name}님 인증 완료.`);
            } else { showMessage("비밀번호 오류.", true); }
        };

        window.logout = () => {
            authenticatedUser = null; isAdmin = false;
            document.getElementById('studentPw').value = "";
            document.getElementById('amSelect').value = "";
            document.getElementById('pmSelect').value = "";
            updateUI();
        };

        window.saveAssignment = async () => {
            if (!authenticatedUser || isAdmin) return;
            const amId = document.getElementById('amSelect').value;
            const pmId = document.getElementById('pmSelect').value;
            
            if (!amId || !pmId) return showMessage("모두 선택해주세요.", true);
            if (amId === pmId) return showMessage("오전/오후가 중복됩니다.", true);

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "처리 중...";

            try {
                // 서버에서 최신 데이터 다시 확인
                const snapshot = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'assignments'));
                const latest = snapshot.docs.map(doc => doc.data()).filter(a => a.name !== authenticatedUser);
                
                const amCount = latest.filter(a => a.amId == amId).length;
                const pmCount = latest.filter(a => a.pmId == pmId).length;
                const amLimit = programData.am.find(p=>p.id == amId).limit;
                const pmLimit = programData.pm.find(p=>p.id == pmId).limit;

                if (amCount >= amLimit || pmCount >= pmLimit) {
                    showMessage("매진된 프로그램이 포함되어 있습니다. 다시 선택하세요.", true);
                    // 초기화 로직: 선택창 초기화
                    document.getElementById('amSelect').value = "";
                    document.getElementById('pmSelect').value = "";
                    resetButton();
                    return;
                }

                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'assignments', authenticatedUser), {
                    name: authenticatedUser, amId, pmId, timestamp: new Date().toISOString()
                });
                
                document.getElementById('successModal').classList.remove('hidden');
                document.getElementById('successModal').classList.add('flex');
                resetButton();
            } catch (e) {
                showMessage("오류 발생. 다시 시도하세요.", true);
                resetButton();
            }
        };

        function resetButton() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = false;
            const existing = assignments.find(a => a.name === authenticatedUser);
            btn.innerText = existing ? "신청 내역 수정하기" : "신청 완료";
        }

        window.closeModal = () => {
            document.getElementById('successModal').classList.add('hidden');
            document.getElementById('successModal').classList.remove('flex');
        };

        window.deleteEntry = async (name) => {
            if (confirm(`${name} 삭제?`)) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'assignments', name));
            }
        };

        function updateUI() {
            if (authenticatedUser) {
                document.getElementById('authInputGroup').classList.add('hidden');
                document.getElementById('userInfoSection').classList.remove('hidden');
                document.getElementById('userNameDisplay').innerText = isAdmin ? "관리자" : authenticatedUser;
                document.getElementById('programSection').classList.remove('locked');
            } else {
                document.getElementById('authInputGroup').classList.remove('hidden');
                document.getElementById('userInfoSection').classList.add('hidden');
                document.getElementById('programSection').classList.add('locked');
            }

            const sel = document.getElementById('studentSelect');
            const currentName = sel.value;
            const doneNames = assignments.map(a => a.name);
            sel.innerHTML = '<option value="">성명 선택</option>';
            Object.keys(studentMaster).sort().forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.innerText = name + (doneNames.includes(name) ? " (완료)" : "");
                sel.appendChild(opt);
            });
            sel.value = currentName;

            const renderOpts = (type, selectId) => {
                const selectElem = document.getElementById(selectId);
                const currentVal = selectElem.value;
                const others = assignments.filter(a => a.name !== authenticatedUser);
                
                selectElem.innerHTML = '<option value="">선택하세요</option>';
                programData[type].forEach(p => {
                    const count = others.filter(a => a[`${type}Id`] == p.id).length;
                    const isFull = count >= p.limit;
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.innerText = `${p.name} (${isFull ? '매진' : (p.limit - count) + '석 남음'})`;
                    if (isFull) opt.disabled = true;
                    selectElem.appendChild(opt);
                });
                selectElem.value = currentVal;
            };

            renderOpts('am', 'amSelect');
            renderOpts('pm', 'pmSelect');
            renderStatus();
            renderTable();
        }

        function renderStatus() {
            const draw = (type, statusId) => {
                const div = document.getElementById(statusId);
                div.innerHTML = '';
                programData[type].forEach(p => {
                    const count = assignments.filter(a => a[`${type}Id`] == p.id).length;
                    const isFull = count >= p.limit;
                    const item = document.createElement('div');
                    item.className = `p-3 rounded-xl border text-sm flex justify-between items-center ${isFull ? 'bg-red-50 text-red-500 border-red-100' : 'bg-white border-slate-100'}`;
                    item.innerHTML = `<span>${p.name}</span> <span class="font-bold">${count}/${p.limit}</span>`;
                    div.appendChild(item);
                });
            };
            draw('am', 'amStatus');
            draw('pm', 'pmStatus');
        }

        function renderTable() {
            const tbody = document.getElementById('assignmentTable');
            tbody.innerHTML = '';
            [...assignments].sort((a,b)=>a.name.localeCompare(b.name, 'ko')).forEach(a => {
                const tr = document.createElement('tr');
                tr.className = "border-b text-sm";
                tr.innerHTML = `
                    <td class="p-3 font-bold text-slate-700">${a.name}</td>
                    <td class="p-3 text-blue-600">${programData.am.find(p=>p.id==a.amId)?.name || "-"}</td>
                    <td class="p-3 text-orange-600">${programData.pm.find(p=>p.id==a.pmId)?.name || "-"}</td>
                    <td class="p-3 text-center">
                        ${isAdmin ? `<button onclick="deleteEntry('${a.name}')" class="text-red-400">삭제</button>` : '-'}
                    </td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('totalCount').innerText = assignments.length;
        }

        window.showMessage = (msg, isErr) => {
            const box = document.getElementById('msgBox');
            box.innerText = msg; box.className = `mt-4 p-4 rounded-xl text-center text-xs font-bold ${isErr ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}`;
            box.classList.remove('hidden'); setTimeout(() => box.classList.add('hidden'), 3000);
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; }
        .card { background: white; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .locked { opacity: 0.3; pointer-events: none; filter: grayscale(1); }
        .modal-overlay { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="successModal" class="fixed inset-0 z-50 hidden items-center justify-center p-6 modal-overlay">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <h3 class="text-2xl font-black mb-2">신청 완료!</h3>
            <p class="text-slate-500 mb-8">성공적으로 저장되었습니다.</p>
            <button onclick="closeModal()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold">확인</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto space-y-6">
        <header class="text-center">
            <h1 class="text-2xl font-black text-slate-800">2학년 2반 체험 활동 신청</h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 space-y-6">
                <section class="card p-6 border-t-4 border-blue-500">
                    <h2 class="font-bold text-slate-700 mb-4">본인 확인</h2>
                    <div id="authInputGroup" class="space-y-3">
                        <select id="studentSelect" class="w-full p-3 rounded-xl bg-slate-50 border ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-blue-500"></select>
                        <input id="studentPw" type="password" class="w-full p-3 rounded-xl bg-slate-50 border ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-blue-500" placeholder="비밀번호(생일4자리)">
                        <button onclick="handleAuth()" class="w-full py-3 bg-slate-800 text-white rounded-xl font-bold">로그인</button>
                    </div>
                    <div id="userInfoSection" class="hidden text-center py-2">
                        <p class="font-bold text-lg text-slate-800 mb-2"><span id="userNameDisplay"></span>님</p>
                        <button onclick="logout()" class="text-slate-400 text-xs underline">다른 학생 로그인</button>
                    </div>
                    <div id="msgBox" class="hidden"></div>
                </section>

                <section id="programSection" class="card p-6 border-t-4 border-orange-500 locked">
                    <h2 class="font-bold text-slate-700 mb-4">프로그램 선택</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 block mb-1">오전</label>
                            <select id="amSelect" class="w-full p-3 rounded-xl bg-slate-50 border ring-1 ring-slate-200 outline-none"></select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 block mb-1">오후</label>
                            <select id="pmSelect" class="w-full p-3 rounded-xl bg-slate-50 border ring-1 ring-slate-200 outline-none"></select>
                        </div>
                        <button id="submitBtn" onclick="saveAssignment()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-black shadow-lg">신청하기</button>
                    </div>
                </section>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <section class="card p-6">
                    <h2 class="font-bold text-slate-700 mb-4 flex justify-between">
                        <span>📊 실시간 현황</span>
                        <span class="text-xs font-normal text-slate-400">총 <span id="totalCount" class="text-blue-500 font-bold">0</span>명 신청</span>
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div id="amStatus" class="space-y-2"></div>
                        <div id="pmStatus" class="space-y-2"></div>
                    </div>
                </section>

                <section class="card p-6 overflow-hidden">
                    <h2 class="font-bold text-slate-700 mb-4">명단 확인</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                    <th class="p-3">성명</th>
                                    <th class="p-3">오전</th>
                                    <th class="p-3">오후</th>
                                    <th class="p-3 text-center">관리</th>
                                </tr>
                            </thead>
                            <tbody id="assignmentTable"></tbody>
                        </table>
                    </div>
                </section>
            </div>
        </div>
    </div>
</body>
</html>
